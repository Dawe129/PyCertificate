<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Certification Quiz</title>
<style>

  /* MENU */
  .menu { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }

  .menu p { color: #aaa; margin-bottom: 40px; font-size: 1.1em; }
  .menu-grid { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 400px; }

  .menu-card:hover { border-color: #e94560; transform: translateY(-2px); box-shadow: 0 6px 25px rgba(233,69,96,0.25); }
  .menu-card.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
  .menu-card h2 { font-size: 1.4em; margin-bottom: 6px; color: #fff; }
  .menu-card span { font-size: 0.9em; color: #aaa; }
  .menu-actions { margin-top: 12px; display: flex; justify-content: center; }
  .menu-btn { border: 1px solid #555; background: #1a1a1a; color: #ddd; border-radius: 8px; padding: 7px 12px; font-size: 0.8em; cursor: pointer; }
  .menu-btn:hover { border-color: #e94560; color: #fff; }

  /* QUIZ VIEW */
  .quiz-view { display: none; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .top-bar h2 { color: #e94560; font-size: 1.3em; }
  .score-info { font-size: 0.95em; color: #ccc; }
  .score-info .ok { color: #4caf50; font-weight: 700; }
  .score-info .fail { color: #e94560; font-weight: 700; }
  .btn { border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.9em; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .btn-back { background: #222; color: #fff; }
  .btn-back:hover { background: #444; }
  .btn-submit { background: #e94560; color: #fff; }
  .btn-submit:hover { background: #c73650; }
  .btn-submit:disabled { opacity: 0.4; cursor: default; }

  /* QUESTION */
  .question-block { background: #111; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); min-height: 300px; }
  .q-header { font-size: 0.85em; color: #e94560; font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .q-text { font-size: 1.05em; margin-bottom: 6px; line-height: 1.5; }
  .q-code { background: #1a1a1a; border-radius: 8px; padding: 14px; margin: 10px 0 14px; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.92em; white-space: pre-wrap; line-height: 1.5; color: #e0e0e0; border-left: 4px solid #e94560; }

  .answers { display: flex; flex-direction: column; gap: 8px; }
  .answer-btn { background: #1a1a1a; border: 2px solid #333; border-radius: 8px; padding: 12px 16px; text-align: left; cursor: pointer; font-size: 0.95em; color: #fff; transition: all 0.2s; font-family: inherit; line-height: 1.4; }
  .answer-btn:hover:not(.disabled) { border-color: #e94560; background: #222; }
  .answer-btn.disabled { cursor: default; }
  .answer-btn.correct { background: #1b5e20; border-color: #4caf50; color: #fff; }
  .answer-btn.wrong { background: #b71c1c; border-color: #e53935; color: #fff; }
  .answer-btn.show-correct { border-color: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.5); }
  .answer-btn.multi-selected { border-color: #ffc107; background: #222; }
  .multi-note { font-size: 0.85em; color: #ffc107; margin-bottom: 8px; }
  .answer-reveal-wrap { margin-bottom: 12px; }
  .answer-note-box { margin: 10px 0 12px; padding: 10px 12px; border-radius: 8px; background: #1a1a1a; border-left: 4px solid #4caf50; color: #ddd; font-size: 0.92em; line-height: 1.45; }
  .result-msg { margin-top: 12px; font-weight: bold; font-size: 1em; }
  .result-msg.ok { color: #4caf50; }
  .result-msg.fail { color: #e94560; }

  .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #333; padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 100; }
  .nav-dots { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; flex: 1; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #333; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
  .dot:hover { border-color: #e94560; }
  .dot.current { border-color: #e94560; background: #e94560; }
  .dot.answered-ok { background: #4caf50; }
  .dot.answered-fail { background: #e53935; }

  /* RESULTS */
  .results-view { display: none; text-align: center; padding-top: 60px; }
  .results-view h2 { font-size: 2em; color: #e94560; margin-bottom: 20px; }
  .results-view .big-score { font-size: 3em; font-weight: 700; margin: 20px 0; }
  .results-view .big-score.pass { color: #4caf50; }
  .results-view .big-score.nopass { color: #e94560; }
  .results-view p { color: #ccc; font-size: 1.1em; margin-bottom: 30px; }
</style>
</head>

    <p id="finalMsg"></p>

      <button class="btn btn-back" onclick="backToMenu()" style="font-size:1.1em;padding:14px 30px;">← Zpět na menu</button>

  </div>

</div>

// State
let currentQuiz = null;
let currentQuizId = null;
let currentShuffled = false;
let currentIndex = 0;
let correctTotal = 0;
let wrongTotal = 0;
let answered = 0;
let questionState = []; // per-question: { answered: bool, correct: bool, selected: Set, revealed: bool, showAnswerInfo: bool }
let multiSelections = {};

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function shuffleArray(items) {
  for (let i = items.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [items[i], items[j]] = [items[j], items[i]];
  }
}

function startQuiz(quizId, shuffleQuestions = false) {
  const data = quizData[quizId];
  if (!data) return;
  const questions = data.questions.map(q => ({
    ...q,
    answers: Array.isArray(q.answers) ? [...q.answers] : [],
    correct: Array.isArray(q.correct) ? [...q.correct] : []
  }));
  if (shuffleQuestions) shuffleArray(questions);

  currentQuiz = {
    title: data.title,
    questions
  };
  currentQuizId = quizId;
  currentShuffled = shuffleQuestions;
  currentIndex = 0;
  correctTotal = 0;
  wrongTotal = 0;
  answered = 0;
  multiSelections = {};
  questionState = data.questions.map(() => ({ answered: false, correct: false, selected: new Set(), revealed: false, showAnswerInfo: false }));

  document.getElementById('quizTitle').textContent = data.title;
  document.getElementById('menuView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'none';
  document.getElementById('quizView').style.display = 'block';

  buildDots();
  updateScore();
  showQuestion(0);
}

function backToMenu() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'none';
  document.getElementById('menuView').style.display = 'flex';
  currentQuiz = null;
}

function buildDots() {
  const container = document.getElementById('navDots');
  container.innerHTML = '';
  currentQuiz.questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.title = 'Otázka ' + (i + 1);
    d.addEventListener('click', () => showQuestion(i));
    container.appendChild(d);
  });
}

function updateDots() {
  const dots = document.querySelectorAll('#navDots .dot');
  dots.forEach((d, i) => {
    d.className = 'dot';
    if (i === currentIndex) d.classList.add('current');
    if (questionState[i].answered) {
      d.classList.add(questionState[i].correct ? 'answered-ok' : 'answered-fail');
    }
  });
}

function updateScore() {
  document.getElementById('correctCount').textContent = correctTotal;
  document.getElementById('wrongCount').textContent = wrongTotal;
  document.getElementById('remainCount').textContent = currentQuiz.questions.length - answered;
}

function showQuestion(index) {
  currentIndex = index;
  const q = currentQuiz.questions[index];
  const state = questionState[index];
  const total = currentQuiz.questions.length;

  let html = `<div class="question-block">`;
  html += `<div class="q-header">Otázka ${index + 1} / ${total}</div>`;
  html += `<div class="q-text">${escapeHtml(q.q)}</div>`;
  if (q.code) html += `<div class="q-code">${escapeHtml(q.code)}</div>`;
  const hasAnswerInfo = !!q.note || (Array.isArray(q.correct) && q.correct.length > 0);
  if (hasAnswerInfo) {
    const answerLetters = q.correct.map(i => String.fromCharCode(65 + i)).join(', ');
    html += `<div class="answer-reveal-wrap"><button class="btn btn-back" id="toggleAnswerInfoBtn">${state.showAnswerInfo ? 'Skrýt odpověď' : 'Zobrazit odpověď'}</button></div>`;
    if (state.showAnswerInfo) {
      let infoHtml = `<div><strong>Správná možnost:</strong> ${escapeHtml(answerLetters)}</div>`;
      if (q.note) infoHtml += `<div style="margin-top:6px;">${escapeHtml(q.note)}</div>`;
      html += `<div class="answer-note-box">${infoHtml}</div>`;
    }
  }
  if (q.multi && !state.revealed) html += `<div class="multi-note">⚠ Vyber více odpovědí a pak klikni "Potvrdit"</div>`;
  html += `<div class="answers">`;

  q.answers.forEach((a, ai) => {
    const displayText = a.replace(/\\n/g, '\n');
    let cls = 'answer-btn';
    if (state.revealed) {
      cls += ' disabled';
      if (q.correct.includes(ai)) cls += ' correct show-correct';
      if (state.selected.has(ai) && !q.correct.includes(ai)) cls += ' wrong';
      if (state.selected.has(ai) && q.correct.includes(ai)) cls += ' correct';
    } else if (q.multi && state.selected.has(ai)) {
      cls += ' multi-selected';
    }
    html += `<button class="${cls}" data-a="${ai}">${escapeHtml(displayText)}</button>`;
  });

  html += `</div>`;

  if (q.multi && !state.revealed) {
    const disabled = state.selected.size === 0 ? ' disabled' : '';
    html += `<div style="margin-top:12px;"><button class="btn btn-submit" id="confirmMultiBtn"${disabled}>Potvrdit výběr</button></div>`;
  }

  if (state.revealed) {
    html += `<div class="result-msg ${state.correct ? 'ok' : 'fail'}">${state.correct ? '✅ Správně!' : '❌ Špatně!'}</div>`;
  }

  html += `</div>`;

  document.getElementById('questionArea').innerHTML = html;

  // Attach handlers
  if (!state.revealed) {
    document.querySelectorAll('#questionArea .answer-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        const ai = parseInt(this.dataset.a);
        if (q.multi) {
          if (state.selected.has(ai)) {
            state.selected.delete(ai);
          } else {
            state.selected.add(ai);
          }
          showQuestion(index);
        } else {
          state.selected = new Set([ai]);
          revealAnswer(index);
        }
      });
    });

    if (q.multi) {
      const confirmBtn = document.getElementById('confirmMultiBtn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', () => {
          if (state.selected.size > 0) revealAnswer(index);
        });
      }
    }
  }

  const toggleAnswerInfoBtn = document.getElementById('toggleAnswerInfoBtn');
  if (toggleAnswerInfoBtn) {
    toggleAnswerInfoBtn.addEventListener('click', () => {
      state.showAnswerInfo = !state.showAnswerInfo;
      showQuestion(index);
    });
  }

  updateDots();
}

function revealAnswer(qi) {
  const q = currentQuiz.questions[qi];
  const state = questionState[qi];
  if (state.revealed) return;

  const correctSet = new Set(q.correct);
  const isCorrect = state.selected.size === correctSet.size && [...state.selected].every(v => correctSet.has(v));

  state.revealed = true;
  state.answered = true;
  state.correct = isCorrect;

  if (isCorrect) correctTotal++; else wrongTotal++;
  answered++;
  updateScore();
  showQuestion(qi); // re-render with revealed state

  // Auto-advance after a short delay
  const total = currentQuiz.questions.length;
  setTimeout(() => {
    if (answered >= total) {
      showResults();
    } else {
      // Find next unanswered question, or just go to next
      let next = qi + 1;
      if (next >= total) next = questionState.findIndex(s => !s.answered);
      if (next >= 0 && next < total) showQuestion(next);
    }
  }, 1200);
}

function showResults() {
  document.getElementById('quizView').style.display = 'none';
  document.getElementById('resultsView').style.display = 'block';
  const total = currentQuiz.questions.length;
  const pct = Math.round((correctTotal / total) * 100);
  const pass = pct >= 70;
  document.getElementById('finalScore').textContent = `${correctTotal} / ${total} (${pct}%)`;
  document.getElementById('finalScore').className = 'big-score ' + (pass ? 'pass' : 'nopass');
  document.getElementById('finalMsg').textContent = pass ? 'Gratuluju, test splněn! 🎉' : 'Bohužel nesplněno, zkus to znova!';
  document.getElementById('restartBtn').onclick = () => startQuiz(currentQuizId, currentShuffled);
}
</script>
